<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kegiatan hari ini</title>
<meta name="theme-color" content="#3D5A80">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kegiatan">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FAFAF8;
    --line: #E7E7E1;
    --line-soft: #F0F0EB;
    --text: #1E1E1B;
    --text-dim: #8B8B82;
    --text-faint: #C9C9C1;
    --accent: #3D5A80;
    --accent-soft: #EAF0F5;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  .wrap{
    max-width: 620px;
    margin: 0 auto;
    padding: 56px 24px 100px;
    position: relative;
  }

  /* quiet hero date */
  .hero{
    display:flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 48px;
  }
  .hero-left .eyebrow{
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .hero-left .eyebrow .clock{
    color: var(--text-faint);
  }
  .hero-left .eyebrow .dot{
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--text-faint);
  }
  .hero-left h1{
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 28px;
    margin: 0;
    color: var(--text);
  }
  .hero-date{
    text-align: right;
    line-height: 0.85;
    flex-shrink: 0;
  }
  .hero-date .num{
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 64px;
    color: var(--text-faint);
    display:block;
  }
  .hero-date .mon{
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* progress line */
  .progress-row{
    display:flex;
    align-items:center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .progress-text{
    font-size: 13px;
    color: var(--text-dim);
  }
  .progress-track{
    height: 2px;
    background: var(--line);
    margin-bottom: 32px;
    position: relative;
  }
  .progress-fill{
    position:absolute;
    left:0; top:0;
    height: 2px;
    background: var(--accent);
    width: 0%;
    transition: width .3s ease;
  }

  /* filters */
  .filters{
    display:flex;
    gap: 16px;
    margin-bottom: 24px;
    font-size: 13px;
  }
  .filters button{
    background: none;
    border: none;
    padding: 0;
    color: var(--text-faint);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    border-bottom: 1px solid transparent;
    padding-bottom: 2px;
  }
  .filters button.active{
    color: var(--text);
    border-bottom-color: var(--text);
  }

  /* list */
  .list{ margin-bottom: 4px; }
  .row{
    display:flex;
    align-items:center;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--line-soft);
  }
  .check{
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--text-faint);
    flex-shrink: 0;
    cursor: pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: border-color .15s, background .15s;
  }
  .check.done{
    border-color: var(--accent);
    background: var(--accent);
  }
  .check svg{
    width: 11px;
    height: 11px;
    stroke: white;
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 16;
    stroke-dashoffset: 16;
    transition: stroke-dashoffset .25s ease;
  }
  .check.done svg{ stroke-dashoffset: 0; }

  .row-text{
    flex: 1;
    min-width: 0;
    font-size: 15px;
    line-height: 1.4;
    word-break: break-word;
  }
  .row-text.done{
    color: var(--text-faint);
    text-decoration: line-through;
  }

  .tag{
    font-size: 11px;
    color: var(--text-dim);
    background: var(--line-soft);
    padding: 3px 9px;
    border-radius: 20px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .time-badge{
    font-size: 12px;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    white-space: nowrap;
    min-width: 40px;
  }
  .time-badge.overdue{
    color: #C0574D;
  }
  .time-badge.empty-slot{
    color: var(--text-faint);
  }

  .del{
    background: none;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
    opacity: 0;
    transition: opacity .15s, color .15s;
    flex-shrink: 0;
  }
  .row:hover .del{ opacity: 1; }
  .del:hover{ color: #C0574D; }

  .empty{
    text-align: center;
    color: var(--text-faint);
    font-size: 14px;
    padding: 40px 0;
  }

  /* add row */
  .add-row{
    display:flex;
    align-items:center;
    gap: 14px;
    padding: 18px 0 8px;
    margin-top: 8px;
  }
  .add-plus{
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px dashed var(--text-faint);
    flex-shrink: 0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 13px;
    color: var(--text-faint);
  }
  #taskInput{
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--text);
    padding: 4px 0;
  }
  #taskInput::placeholder{ color: var(--text-faint); }

  select#waktuSelect{
    border: none;
    background: var(--line-soft);
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    padding: 5px 8px;
    border-radius: 20px;
    flex-shrink: 0;
    cursor: pointer;
  }
  select#waktuSelect:focus{ outline: 1px solid var(--accent); }

  #jamInput{
    border: none;
    background: var(--line-soft);
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    padding: 5px 8px;
    border-radius: 20px;
    flex-shrink: 0;
    cursor: pointer;
    width: 92px;
  }
  #jamInput:focus{ outline: 1px solid var(--accent); }

  @media (max-width: 480px){
    .hero-date .num{ font-size: 48px; }
    .add-row{ flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div class="hero-left">
      <div class="eyebrow">Kegiatan hari ini <span class="dot"></span> <span class="clock" id="liveClock">--:--</span></div>
      <h1 id="greeting">Selamat beraktivitas</h1>
    </div>
    <div class="hero-date">
      <span class="num" id="dateNum">--</span>
      <span class="mon" id="dateMon">---</span>
    </div>
  </div>

  <div class="progress-row">
    <span class="progress-text" id="progressText">0 dari 0 selesai</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

  <div class="filters">
    <button class="active" data-filter="semua">Semua</button>
    <button data-filter="aktif">Aktif</button>
    <button data-filter="selesai">Selesai</button>
  </div>

  <div class="list" id="listRoot"></div>

  <div class="add-row">
    <div class="add-plus">+</div>
    <input type="text" id="taskInput" placeholder="Tambah kegiatan..." maxlength="120">
    <input type="time" id="jamInput">
    <select id="waktuSelect">
      <option value="">tanpa waktu</option>
      <option value="pagi">pagi</option>
      <option value="siang">siang</option>
      <option value="sore">sore</option>
      <option value="malam">malam</option>
    </select>
  </div>

</div>

<script>
(function(){
  var canvas = document.createElement('canvas');
  canvas.width = 192;
  canvas.height = 192;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#3D5A80';
  ctx.fillRect(0, 0, 192, 192);
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = 16;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(48, 100);
  ctx.lineTo(80, 132);
  ctx.lineTo(148, 60);
  ctx.stroke();
  var iconUrl = canvas.toDataURL('image/png');

  var appleIcon = document.createElement('link');
  appleIcon.rel = 'apple-touch-icon';
  appleIcon.href = iconUrl;
  document.head.appendChild(appleIcon);

  var favicon = document.createElement('link');
  favicon.rel = 'icon';
  favicon.href = iconUrl;
  document.head.appendChild(favicon);

  var manifest = {
    name: 'Kegiatan Hari Ini',
    short_name: 'Kegiatan',
    start_url: '.',
    display: 'standalone',
    background_color: '#FAFAF8',
    theme_color: '#3D5A80',
    icons: [
      { src: iconUrl, sizes: '192x192', type: 'image/png' }
    ]
  };
  var manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  var manifestUrl = URL.createObjectURL(manifestBlob);
  var manifestLink = document.createElement('link');
  manifestLink.rel = 'manifest';
  manifestLink.href = manifestUrl;
  document.head.appendChild(manifestLink);
})();

(function(){
  var STORAGE_KEY = 'kegiatan_list_v1';
  var tasks = [];
  var currentFilter = 'semua';
  var loaded = false;

  var HARI = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  var BULAN_SHORT = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  var BULAN_FULL = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

  function pad(n){ return n < 10 ? '0'+n : ''+n; }
  function nowTimeStr(){ var d = new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
  function todayStr(){ var d = new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function uid(){ return 't' + Date.now() + Math.floor(Math.random()*1000); }
  var lastKnownDate = todayStr();

  function setHero(){
    var d = new Date();
    document.getElementById('dateNum').textContent = d.getDate();
    document.getElementById('dateMon').textContent = BULAN_SHORT[d.getMonth()];
    var h = d.getHours();
    var sapaan = h < 11 ? 'Selamat pagi' : (h < 15 ? 'Selamat siang' : (h < 18 ? 'Selamat sore' : 'Selamat malam'));
    document.getElementById('greeting').textContent = sapaan;
  }
  setHero();

  function updateClock(){
    document.getElementById('liveClock').textContent = nowTimeStr();
    setHero();
    if(todayStr() !== lastKnownDate){
      rolloverTasks();
      render();
    }
  }
  updateClock();
  setInterval(updateClock, 1000 * 15);

  function rolloverTasks(){
    var today = todayStr();
    var changed = false;
    tasks.forEach(function(t){
      if(!t.done && t.date !== today){
        t.date = today;
        t.jam = '';
        changed = true;
      }
    });
    if(changed) saveTasks();
    lastKnownDate = today;
  }

  function saveTasks(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }
    catch(e){ console.error('gagal menyimpan', e); }
  }

  function loadTasks(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw){ tasks = JSON.parse(raw); }
    }catch(e){ tasks = []; }
    var today = todayStr();
    tasks.forEach(function(t){ if(!t.date) t.date = today; });
    rolloverTasks();
    loaded = true;
    render();
  }

  function addTask(){
    var input = document.getElementById('taskInput');
    var text = input.value.trim();
    if(!text) return;
    var waktu = document.getElementById('waktuSelect').value;
    var jamInput = document.getElementById('jamInput');
    var jam = jamInput.value || '';
    tasks.push({
      id: uid(),
      text: text,
      waktu: waktu,
      jam: jam,
      date: todayStr(),
      done: false,
      createdAt: nowTimeStr()
    });
    input.value = '';
    jamInput.value = '';
    saveTasks();
    render();
  }

  function toggleTask(id){
    var t = tasks.find(function(x){ return x.id === id; });
    if(!t) return;
    t.done = !t.done;
    saveTasks();
    render();
  }

  function deleteTask(id){
    tasks = tasks.filter(function(x){ return x.id !== id; });
    saveTasks();
    render();
  }

  function render(){
    if(!loaded) return;
    var today = todayStr();
    var todayTasks = tasks.filter(function(t){ return t.date === today; });

    var total = todayTasks.length;
    var doneCount = todayTasks.filter(function(t){ return t.done; }).length;
    var pct = total ? Math.round((doneCount/total)*100) : 0;
    document.getElementById('progressText').textContent = doneCount + ' dari ' + total + ' selesai';
    document.getElementById('progressFill').style.width = pct + '%';

    var filtered = todayTasks.filter(function(t){
      if(currentFilter === 'aktif') return !t.done;
      if(currentFilter === 'selesai') return t.done;
      return true;
    });

    filtered = filtered.slice().sort(function(a, b){
      if(!a.jam && !b.jam) return 0;
      if(!a.jam) return 1;
      if(!b.jam) return -1;
      return a.jam.localeCompare(b.jam);
    });

    var currentTime = nowTimeStr();

    var root = document.getElementById('listRoot');
    root.innerHTML = '';

    if(filtered.length === 0){
      var empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = total === 0 ? 'Belum ada kegiatan. Tambahkan satu di bawah.' : 'Tidak ada kegiatan pada filter ini.';
      root.appendChild(empty);
      return;
    }

    filtered.forEach(function(t){
      var row = document.createElement('div');
      row.className = 'row';

      var check = document.createElement('div');
      check.className = 'check' + (t.done ? ' done' : '');
      check.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="4,13 9,18 20,6"></polyline></svg>';
      check.onclick = function(){ toggleTask(t.id); };
      row.appendChild(check);

      var timeBadge = document.createElement('span');
      if(t.jam){
        var overdue = !t.done && t.jam < currentTime;
        timeBadge.className = 'time-badge' + (overdue ? ' overdue' : '');
        timeBadge.textContent = t.jam;
      }else{
        timeBadge.className = 'time-badge empty-slot';
        timeBadge.textContent = '\u00b7\u00b7:\u00b7\u00b7';
      }
      row.appendChild(timeBadge);

      var text = document.createElement('div');
      text.className = 'row-text' + (t.done ? ' done' : '');
      text.textContent = t.text;
      row.appendChild(text);

      if(t.waktu){
        var tag = document.createElement('span');
        tag.className = 'tag';
        tag.textContent = t.waktu;
        row.appendChild(tag);
      }

      var del = document.createElement('button');
      del.className = 'del';
      del.textContent = '\u00d7';
      del.title = 'hapus';
      del.onclick = function(){ deleteTask(t.id); };
      row.appendChild(del);

      root.appendChild(row);
    });
  }

  document.getElementById('taskInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter') addTask();
  });

  document.querySelectorAll('.filters button').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.filters button').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      currentFilter = btn.getAttribute('data-filter');
      render();
    });
  });

  loadTasks();
})();
</script>
</body>
</html>
